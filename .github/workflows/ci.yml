on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Conan and tools
        run: |
          pip install conan meson ninja

      - name: Install pkg-config on Windows
        if: runner.os == 'Windows'
        run: choco install pkgconfiglite
        shell: cmd

      - name: Install LLVM (clang) on Windows
        if: runner.os == 'Windows'
        run: choco install llvm
        shell: cmd

      - name: Install dependencies with Conan
        run: |
          conan profile detect
          mkdir -p buildDir
          conan install . --output-folder=buildDir --build=missing

      - name: Configure and build
        run: |
          cd buildDir
          meson setup . .. --prefix=/usr/local --native-file conan_meson_native.ini --native-file ../compiler_options.ini
          meson compile
        shell: ${{ runner.os == 'Windows' && 'pwsh' || 'bash' }}