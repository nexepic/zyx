name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Conan and tools
        run: |
          pip install conan meson ninja gcovr

      - name: Install pkg-config on Windows
        if: runner.os == 'Windows'
        run: choco install pkgconfiglite
        shell: cmd

      - name: Install LLVM (clang) on Windows
        if: runner.os == 'Windows'
        run: choco install llvm --version=20.1.4 --force
        shell: cmd

      - name: Install dependencies with Conan
        run: |
          conan profile detect
          mkdir -p buildDir
          conan install . --output-folder=buildDir --build=missing

      - name: Configure and build (Windows with clang-cl)
        if: runner.os == 'Windows'
        run: |
          cd buildDir
          meson setup . .. --prefix=/usr/local --native-file conan_meson_native.ini --native-file ../compiler_options_win64.ini -Db_coverage=true
          meson compile
        shell: pwsh

      - name: Configure and build (non-Windows)
        if: runner.os != 'Windows'
        run: |
          cd buildDir
          meson setup . .. --prefix=/usr/local --native-file conan_meson_native.ini --native-file ../compiler_options.ini -Db_coverage=true
          meson compile

      - name: Run unit tests
        run: |
          cd buildDir
          meson test --verbose

      - name: Generate coverage report
        if: runner.os != 'Windows'
        run: |
          cd buildDir
          gcovr --root .. --xml --output coverage.xml --exclude-unreachable-branches --exclude-throw-branches

      - name: Generate coverage report (Windows)
        if: runner.os == 'Windows'
        run: |
          cd buildDir
          gcovr --root .. --xml --output coverage.xml --exclude-unreachable-branches --exclude-throw-branches --gcov-executable "llvm-cov gcov"
        shell: pwsh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./buildDir/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true