on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          miniconda-version: "latest"
          auto-update-conda: true
          activate-environment: build-env
          environment-file: environment.yml
          auto-activate-base: false
          use-mamba: true

      - name: Display Python & Meson version
        shell: bash -l {0}
        run: |
          python --version
          meson --version
          ninja --version

      - name: Configure the build
        shell: bash -l {0}
        run: |
          # Get and export the actual conda environment path
          export CONDA_ENV_PATH=$(conda info --envs | grep build-env | awk '{print $NF}')
          echo "Using Conda environment at: $CONDA_ENV_PATH"
          
          # Set pkg-config path to include the conda environment
          export PKG_CONFIG_PATH=$CONDA_ENV_PATH/lib/pkgconfig:$PKG_CONFIG_PATH
          
          # Debug output to verify pkg-config can find boost-cpp
          echo "Available pkg-config packages:"
          pkg-config --list-all | grep -i boost
          
          # Configure with meson, passing proper paths
          mkdir -p buildDir
          meson setup buildDir \
            --native-file compiler_options.ini \
            --pkg-config-path=$CONDA_ENV_PATH/lib/pkgconfig \
            --includedir=$CONDA_ENV_PATH/include \
            --libdir=$CONDA_ENV_PATH/lib

      - name: Build the project
        shell: bash -l {0}
        run: |
          meson compile -C buildDir