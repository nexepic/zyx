name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Ensure Conan 2.x is compatible or use a newer Python if needed

      - name: Install Conan and tools
        run: |
          pip install conan meson ninja

      - name: Install dependencies with Conan
        run: |
          conan profile detect # Creates a default profile if one doesn't exist
          mkdir -p buildDir
          # Conan install using the conanfile.py in the current directory (.),
          # outputting generated files and dependency info into buildDir.
          conan install . --output-folder=buildDir --build=missing

      - name: Set up Visual Studio environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure and build (Windows)
        if: runner.os == 'Windows'
        run: |
          cd buildDir
          # Use conan_toolchain.meson as the native file
          meson setup . .. --prefix=/usr/local --native-file conan_toolchain.meson
          meson compile
        shell: pwsh

      - name: Configure and build (non-Windows)
        if: runner.os != 'Windows'
        run: |
          cd buildDir
          # Use conan_toolchain.meson as the native file
          # Also ensure compiler_options.ini is correctly located relative to '..' (project root)
          meson setup . .. --prefix=/usr/local --native-file conan_toolchain.meson --native-file ../compiler_options.ini
          meson compile