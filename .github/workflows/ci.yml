on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install pkg-config on Windows
        if: matrix.os == 'windows-latest'
        run: |
          choco install pkgconfiglite
          # Ensure PKG_CONFIG_PATH includes Conan's output directory
          echo "PKG_CONFIG_PATH=${{ github.workspace }}\buildDir" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install Conan and tools
        run: |
          pip install conan meson ninja

      - name: Install dependencies with Conan
        run: |
          conan profile detect
          mkdir -p buildDir
          conan install . --output-folder=buildDir --build=missing

      - name: Configure and build
        run: |
          cd buildDir
          meson setup . .. --prefix=/usr/local --native-file conan_meson_native.ini --native-file ../compiler_options.ini
          meson compile