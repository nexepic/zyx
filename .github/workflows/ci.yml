name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Conan and tools
        run: |
          pip install conan meson ninja gcovr

      - name: Install pkg-config on Windows
        if: runner.os == 'Windows'
        run: choco install pkgconfiglite
        shell: cmd

      - name: Install LLVM (clang) on Windows
        if: runner.os == 'Windows'
        run: choco install llvm --version=20.1.4 --force
        shell: cmd

      - name: Install LLVM on Ubuntu
        if: runner.os == 'Linux'
        run: |
          # Add LLVM repository key and source
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo apt-add-repository "deb http://apt.llvm.org/$(lsb_release -sc)/ llvm-toolchain-$(lsb_release -sc)-20 main"
          sudo apt update
          # Install LLVM 20 tools
          sudo apt install -y clang-20 llvm-20
          # Create symlinks to make them default
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 100
          sudo update-alternatives --install /usr/bin/llvm-cov llvm-cov /usr/bin/llvm-cov-20 100

      - name: Install dependencies with Conan
        run: |
          conan profile detect
          mkdir -p buildDir
          conan install . --output-folder=buildDir --build=missing

      - name: Configure and build (Windows with clang-cl)
        if: runner.os == 'Windows'
        run: |
          cd buildDir
          meson setup . .. --prefix=/usr/local --native-file conan_meson_native.ini --native-file ../compiler_options_win64.ini -Db_coverage=true
          meson compile
        shell: pwsh

      - name: Configure and build (non-Windows)
        if: runner.os != 'Windows'
        run: |
          cd buildDir
          meson setup . .. --prefix=/usr/local --native-file conan_meson_native.ini --native-file ../compiler_options.ini -Db_coverage=true
          meson compile

      - name: Run unit tests
        run: |
          cd buildDir
          meson test --verbose

      - name: Generate coverage report
        if: runner.os != 'Windows'
        run: |
          cd buildDir
          gcovr --root .. --xml --output coverage.xml --exclude-unreachable-branches --exclude-throw-branches --gcov-executable "llvm-cov gcov"

      - name: Generate coverage report (Windows)
        if: runner.os == 'Windows'
        run: |
          cd buildDir
          gcovr --root .. --xml --output coverage.xml --exclude-unreachable-branches --exclude-throw-branches --gcov-executable "llvm-cov gcov"
        shell: pwsh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./buildDir/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true