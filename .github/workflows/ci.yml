name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up dependencies and Clang (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang ninja-build meson libboost-all-dev zlib1g-dev libreadline-dev libgtest-dev
          sudo cp /usr/lib/x86_64-linux-gnu/libgtest*.a /usr/lib/
          export CC=clang
          export CXX=clang++

      - name: Set up dependencies and Clang (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install clang ninja meson boost zlib readline googletest
          export CC=clang
          export CXX=clang++

      - name: Set up dependencies and Clang (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install llvm ninja meson boost-msvc-14.2 zlib
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install gtest
          set VCPKG_ROOT=%cd%\vcpkg
          set PATH=%VCPKG_ROOT%\installed\x64-windows\bin;%PATH%
          set CC=clang
          set CXX=clang++

      - name: Configure the build
        run: |
          meson setup builddir --native-file <(echo -e "[binaries]\nc = 'clang'\ncxx = 'clang++'")
        shell: bash

      - name: Build the project
        run: |
          meson compile -C builddir
        shell: bash
