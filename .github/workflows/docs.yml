name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./docs
        run: bun install --frozen-lockfile

      - name: Build NexDoc site
        working-directory: ./docs
        env:
          BASE_PATH: /zyx
        run: bun run build

      - name: Fix asset paths for GitHub Pages
        working-directory: ./docs/apps/docs/out
        run: |
          # Replace /assets/ paths with /zyx/assets/ in HTML files
          find . -type f -name "*.html" -exec sed -i 's|href="/assets/|href="/zyx/assets/|g' {} +
          find . -type f -name "*.html" -exec sed -i 's|src="/assets/|src="/zyx/assets/|g' {} +

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/apps/docs/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
