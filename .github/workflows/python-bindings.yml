name: Python Bindings

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/python-bindings.yml'
      - 'bindings/python/**'
      - 'include/**'
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/python-bindings.yml'
      - 'bindings/python/**'
      - 'include/**'
      - 'src/**'
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: '3.11'
          - os: ubuntu-latest
            python: '3.12'
          - os: ubuntu-latest
            python: '3.13'
          - os: macos-latest
            python: '3.12'
          - os: windows-latest
            python: '3.12'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install build tools
        run: pip install meson ninja conan

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo apt-add-repository "deb http://apt.llvm.org/$(lsb_release -sc)/ llvm-toolchain-$(lsb_release -sc)-20 main"
          sudo apt update
          sudo apt install -y clang-20 llvm-20 libc++-20-dev libc++abi-20-dev

      # Install pkgconfiglite BEFORE Conan (needed for dependency resolution).
      # LLVM is installed AFTER Conan to prevent conan profile detect from
      # picking up clang instead of MSVC (which breaks prebuilt package matching).
      - name: Install pkg-config (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install pkgconfiglite --allow-empty-checksums
          echo "C:\Program Files\pkgconfiglite\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install pkg-config

      - name: Install Conan dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          conan profile detect
          mkdir -p buildDir
          conan install . --output-folder=buildDir --build=missing -s build_type=Debug -s compiler.cppstd=20

      # Use Release to match meson-python's default buildtype=release (avoids /MD vs /MDd CRT mismatch).
      # Load vcvarsall.bat temporarily so conan profile detect finds MSVC (cl.exe),
      # not VS-bundled clang-cl. The env changes stay within this pwsh process only.
      - name: Install Conan dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          cmd /c "`"$vsPath\VC\Auxiliary\Build\vcvarsall.bat`" x64 && set" | ForEach-Object {
            if ($_ -match "^([^=]+)=(.*)$") {
              [System.Environment]::SetEnvironmentVariable($matches[1], $matches[2])
            }
          }
          $env:CC = "cl"
          $env:CXX = "cl"
          conan profile detect
          mkdir -p buildDir
          conan install . --output-folder=buildDir --build=missing -s build_type=Release -s compiler.cppstd=20
        shell: pwsh

      # Install LLVM AFTER Conan so clang-cl is available for meson-python build
      # but doesn't interfere with Conan's MSVC profile detection.
      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm --version=20.1.4 --force
        shell: pwsh

      - name: Install zyxdb (Unix)
        if: runner.os != 'Windows'
        run: PKG_CONFIG_PATH=$PWD/buildDir pip install "bindings/python[test]"

      # Use clang-cl (from choco LLVM) which auto-discovers VS headers/libs without vcvars.
      - name: Install zyxdb (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:PKG_CONFIG_PATH = "$PWD\buildDir"
          $env:CC = "clang-cl"
          $env:CXX = "clang-cl"
          pip install "bindings/python[test]"
        shell: pwsh

      - name: Run tests
        run: |
          cd bindings/python
          python -m pytest tests/ -v

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: test
    if: github.event_name == 'release'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse bindings/python
        env:
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-*
          CIBW_SKIP: '*-musllinux_*'
          CIBW_BEFORE_ALL_LINUX: >
            pip install conan meson ninja &&
            conan profile detect &&
            mkdir -p buildDir &&
            conan install . --output-folder=buildDir --build=missing -s build_type=Release -s compiler.cppstd=20
          CIBW_BEFORE_ALL_MACOS: >
            brew install pkg-config &&
            pip install conan meson ninja &&
            conan profile detect &&
            mkdir -p buildDir &&
            conan install . --output-folder=buildDir --build=missing -s build_type=Release -s compiler.cppstd=20
          CIBW_BEFORE_ALL_WINDOWS: >
            choco install pkgconfiglite --allow-empty-checksums &&
            pip install conan meson ninja &&
            python -c "import pathlib; p=pathlib.Path.home()/'.conan2'/'profiles'; p.mkdir(parents=True,exist_ok=True); (p/'default').write_text('[settings]\nos=Windows\narch=x86_64\nbuild_type=Release\ncompiler=msvc\ncompiler.version=194\ncompiler.cppstd=20\ncompiler.runtime=dynamic\n')" &&
            mkdir -p buildDir &&
            conan install . --output-folder=buildDir --build=missing &&
            choco install llvm --version=20.1.4 --force
          CIBW_ENVIRONMENT_WINDOWS: CC=clang-cl CXX=clang-cl

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Build sdist
    needs: test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist
        run: pip install build && python -m build --sdist bindings/python --outdir dist/

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  upload-release-assets:
    name: Upload release assets
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
